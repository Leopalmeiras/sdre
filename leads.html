<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CRM SDR | Leads</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body data-page="leads">
    <div class="app-shell">
      <aside id="sidebar" class="sidebar"></aside>
      <main class="content">
        <header class="page-header page-header-row">
          <div><h1>Leads</h1><p>Listagem completa com busca e filtros.</p></div>
          <div class="actions-row">
            <a href="cadastro.html" class="btn-secondary">Novo lead</a>
            <button id="exportLeadsCsv" class="btn-secondary" type="button">Exportar CSV</button>
            <button id="exportLeadsPdf" class="btn-primary" type="button">Exportar PDF</button>
          </div>
        </header>

        <section class="card">
          <div class="filters-row cols-4">
            <input id="leadSearch" type="search" placeholder="Buscar por nome, empresa, e-mail..." />
            <select id="leadFiltroOrigem"><option value="">Todas origens</option></select>
            <select id="leadFiltroClassificacao"><option value="">Todas classificações</option><option>Frio</option><option>Morno</option><option>Quente</option></select>
            <input id="leadFiltroResponsavel" placeholder="Responsável" />
          </div>

          <div class="table-wrapper">
            <table>
              <thead><tr><th>Nome</th><th>Empresa</th><th>Origem</th><th>Classificação</th><th>Contato</th><th>Cadastro</th><th>Ações</th></tr></thead>
              <tbody id="leadsTbody"></tbody>
            </table>
          </div>
        </section>
      </main>
    </div>

    <script src="script.js"></script>
  </body>
</html>
