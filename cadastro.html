<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CRM SDR | Cadastro de Lead</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body data-page="cadastro">
    <div class="app-shell">
      <aside id="sidebar" class="sidebar"></aside>
      <main class="content">
        <header class="page-header"><h1 id="leadFormTitle">Cadastro de Lead</h1></header>

        <section class="card">
          <form id="leadForm" novalidate>
            <input id="leadId" name="leadId" type="hidden" />
            <div class="form-grid">
              <div><label for="nome">Nome *</label><input id="nome" name="nome" required /></div>
              <div><label for="empresa">Empresa *</label><input id="empresa" name="empresa" required /></div>
              <div><label for="email">E-mail *</label><input id="email" name="email" type="email" required /></div>
              <div><label for="telefone">Telefone *</label><input id="telefone" name="telefone" required /></div>
              <div><label for="cnpj">CNPJ *</label><input id="cnpj" name="cnpj" maxlength="18" required /></div>
              <div><label for="origem">Origem *</label><select id="origem" name="origem" required></select></div>
              <div><label for="classificacao">Classificação *</label>
                <select id="classificacao" name="classificacao" required>
                  <option value="">Selecione</option><option>Frio</option><option>Morno</option><option>Quente</option>
                </select>
              </div>
            </div>

            <div id="vendedorBox" class="card subtle hidden">
              <h3>Dados do vendedor (lead quente)</h3>
              <div class="form-grid">
                <div><label for="vendedorNome">Nome do vendedor *</label><input id="vendedorNome" name="vendedorNome" /></div>
                <div><label for="agendamentoData">Data do agendamento *</label><input id="agendamentoData" name="agendamentoData" type="date" /></div>
                <div><label for="agendamentoHora">Horário *</label><input id="agendamentoHora" name="agendamentoHora" type="time" /></div>
                <div><label for="vendedorStatus">Status *</label><input id="vendedorStatus" name="vendedorStatus" placeholder="Ex: Confirmado" /></div>
              </div>
            </div>

            <label for="observacao">Observação</label>
            <textarea id="observacao" name="observacao" rows="4"></textarea>

            <div class="card subtle">
              <h3>Tarefa inicial (opcional)</h3>
              <div class="form-grid">
                <div><label for="tarefaTitulo">Título</label><input id="tarefaTitulo" name="tarefaTitulo" /></div>
                <div><label for="tarefaResponsavel">Responsável</label><input id="tarefaResponsavel" name="tarefaResponsavel" /></div>
                <div><label for="tarefaData">Data</label><input id="tarefaData" name="tarefaData" type="date" /></div>
                <div><label for="tarefaHora">Horário</label><input id="tarefaHora" name="tarefaHora" type="time" /></div>
              </div>
              <label for="tarefaDescricao">Descrição</label>
              <textarea id="tarefaDescricao" name="tarefaDescricao" rows="2"></textarea>
            </div>

            <div class="actions-row">
              <a href="leads.html" class="btn-secondary">Cancelar</a>
              <button type="submit" class="btn-primary">Salvar lead</button>
            </div>
            <p id="leadFormError" class="error-message"></p>
          </form>
        </section>
      </main>
    </div>
    <script src="script.js"></script>
  </body>
</html>
