<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CRM SDR | Login</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body data-page="login" class="login-page">
    <main class="login-wrapper">
      <section class="login-card">
        <div class="logo-wrap login-logo">
          <img src="assets/logo.png" alt="Voice Data" class="logo-img" onerror="this.style.display='none';this.nextElementSibling.style.display='block';" />
          <span class="logo-fallback" style="display:none">Voice Data</span>
        </div>
        <h1>Acesso ao CRM</h1>
        <p class="subtitle">Entre para gerenciar leads, origens e tarefas do SDR.</p>

        <form id="loginForm" novalidate>
          <label for="username">Usuário</label>
          <input id="username" name="username" type="text" autocomplete="username" required />

          <label for="password">Senha</label>
          <input id="password" name="password" type="password" autocomplete="current-password" required />

          <button type="submit" class="btn-primary full">Entrar</button>
          <p id="loginError" class="error-message" aria-live="polite"></p>
        </form>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
